<aside class="w-64 bg-[#051844] flex flex-col flex-shrink-0 sidebar-transition"
       x-show="sidebarOpen && !isMobile"
       x-transition:enter="transition-all duration-300"
       x-transition:enter-start="-translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition-all duration-300"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="-translate-x-full"
       style="display: none;">
    <div class="h-16 flex items-center px-5 border-b border-white/10">
        <div>
            <span class="text-base font-bold text-white tracking-tight">ALCRET</span>
            <span class="text-[10px] text-white/40 block leading-tight">Inventario</span>
        </div>
    </div>
    <nav class="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-0.5" x-data="{ active: '{{ request.resolver_match.url_name }}' }">
        <a href="{% url 'dashboard' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
           :class="active === 'dashboard' ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <a href="{% url 'producto_list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
           :class="active.startsWith('producto') ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            Productos
        </a>
        <a href="{% url 'movimiento_list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
           :class="active.startsWith('movimiento') ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
            Movimientos
        </a>
        <a href="{% url 'categoria_list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
           :class="active.startsWith('categoria') ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
            Categorías
        </a>
        <a href="{% url 'almacen_list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
           :class="active.startsWith('almacen') ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            Almacenes
        </a>
        <div class="pt-3 mt-3 border-t border-white/10">
            <p class="px-3 pb-1 text-[11px] font-semibold text-white/30 uppercase tracking-wider">Administración</p>
            <a href="{% url 'usuario_list' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
               :class="active.startsWith('usuario') ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
                Usuarios
            </a>
            {% if user.rol == 'ADMIN' %}
            <a href="{% url 'auditlog_list' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
               :class="active.startsWith('auditlog') ? 'bg-primary-600 text-white shadow-sm' : 'text-white/60 hover:bg-white/10 hover:text-white'">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Auditoría
            </a>
            {% endif %}
        </div>
    </nav>
</aside>
