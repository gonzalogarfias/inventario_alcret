<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-6">
    <div class="flex items-center gap-4">
        <button @click="toggleSidebar()" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors lg:hidden">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <div>
            <h2 class="text-sm font-semibold text-gray-800">{% block page_title %}Dashboard{% endblock %}</h2>
            <p class="text-xs text-gray-500">{% block page_subtitle %}Resumen del inventario{% endblock %}</p>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" @click.outside="open = false"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors">
                <div class="w-7 h-7 bg-accent-50 text-accent-600 rounded-full flex items-center justify-center text-xs font-bold">
                    {{ user.nombre|first|upper }}
                </div>
                <span class="text-sm font-medium text-gray-700 hidden sm:block">{{ user.nombre }}</span>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div x-show="open" x-transition @click.outside="open = false"
                 class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-200 py-2 z-50">
                <div class="px-4 py-2 border-b border-gray-100">
                    <p class="text-sm font-medium text-gray-900">{{ user.nombre }}</p>
                    <p class="text-xs text-gray-500">{{ user.email }}</p>
                </div>
                <div class="px-2 py-1">
                    <span class="block px-2 py-1.5 text-xs text-gray-500">Rol: <strong>{{ user.get_rol_display }}</strong></span>
                </div>
                <div class="border-t border-gray-100 mt-1 pt-1">
                    <a href="{% url 'logout' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Cerrar sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
