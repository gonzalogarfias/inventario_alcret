<nav x-show="isMobile"
     class="fixed bottom-0 left-0 right-0 bg-[#051844] flex items-center justify-around safe-area-bottom z-50"
     style="display: none;">
    <a href="{% url 'dashboard' %}"
       class="flex flex-col items-center gap-0.5 py-2 px-3 min-w-[64px] min-h-[56px] justify-center transition-colors"
       :class="'{{ request.resolver_match.url_name }}'.startsWith('dashboard') ? 'text-primary-300' : 'text-white/50 hover:text-white/80'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-[10px] font-medium">Dashboard</span>
    </a>
    <a href="{% url 'producto_list' %}"
       class="flex flex-col items-center gap-0.5 py-2 px-3 min-w-[64px] min-h-[56px] justify-center transition-colors"
       :class="'{{ request.resolver_match.url_name }}'.startsWith('producto') ? 'text-primary-300' : 'text-white/50 hover:text-white/80'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span class="text-[10px] font-medium">Productos</span>
    </a>
    <a href="{% url 'movimiento_list' %}"
       class="flex flex-col items-center gap-0.5 py-2 px-3 min-w-[64px] min-h-[56px] justify-center transition-colors"
       :class="'{{ request.resolver_match.url_name }}'.startsWith('movimiento') ? 'text-primary-300' : 'text-white/50 hover:text-white/80'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
        <span class="text-[10px] font-medium">Movimientos</span>
    </a>
    <div x-data="{ open: false }" class="relative">
        <button @click="open = !open" @click.outside="open = false"
                class="flex flex-col items-center gap-0.5 py-2 px-3 min-w-[64px] min-h-[56px] justify-center transition-colors text-white/50 hover:text-white/80">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[10px] font-medium">Perfil</span>
        </button>
        <div x-show="open" x-transition @click.outside="open = false"
             class="absolute bottom-full mb-2 right-0 w-56 bg-[#051844] rounded-xl shadow-lg border border-white/10 py-2 z-50">
            <div class="px-4 py-2.5 border-b border-white/10">
                <p class="text-sm font-medium text-white">{{ user.nombre }}</p>
                <p class="text-xs text-white/50 mt-0.5">{{ user.email }}</p>
                <span class="text-[11px] text-white/40 block mt-1">Rol: {{ user.get_rol_display }}</span>
            </div>
            <div class="px-2 pt-1">
                <a href="{% url 'usuario_list' %}" class="flex items-center gap-2 px-3 py-2 text-sm text-white/60 hover:text-white hover:bg-white/10 rounded-lg transition-colors">Usuarios</a>
                {% if user.rol == 'ADMIN' %}
                <a href="{% url 'auditlog_list' %}" class="flex items-center gap-2 px-3 py-2 text-sm text-white/60 hover:text-white hover:bg-white/10 rounded-lg transition-colors">Auditoría</a>
                {% endif %}
            </div>
            <div class="border-t border-white/10 mt-1 pt-1">
                <a href="{% url 'logout' %}" class="flex items-center gap-2 px-4 py-2.5 text-sm text-red-300 hover:bg-white/10 transition-colors rounded-lg mx-2">Cerrar sesión</a>
            </div>
        </div>
    </div>
</nav>
