{% extends "base_public.html" %}
{% block title %}ALCRET - Correo Enviado{% endblock %}
{% block content %}
<div class="w-full py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-8 text-center">
        <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-lg font-semibold text-ink mb-2">Correo enviado</h2>
        <p class="text-sm text-ink-secondary mb-6">Si el correo existe, recibirás instrucciones para restablecer tu contraseña.</p>
        <a href="{% url 'login' %}" class="text-sm text-primary-600 hover:text-primary-800 font-medium">Volver al inicio de sesión</a>
    </div>
</div>
{% endblock %}
