{% extends "base_public.html" %}
{% block title %}ALCRET - Restablecer Contraseña{% endblock %}
{% block content %}
<div class="w-full py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-1">Restablecer contraseña</h2>
            <p class="text-sm text-gray-500 mb-6">Ingresá tu correo y te enviamos las instrucciones.</p>
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1.5">Correo electrónico</label>
                    <input type="email" name="email" id="id_email" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-colors"
                           placeholder="admin@alcret.com">
                </div>
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">Enviar instrucciones</button>
            </form>
            <p class="text-center mt-4"><a href="{% url 'login' %}" class="text-sm text-primary-600 hover:text-primary-800">Volver al inicio de sesión</a></p>
        </div>
    </div>
</div>
{% endblock %}
