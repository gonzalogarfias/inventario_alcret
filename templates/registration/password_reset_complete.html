{% extends "base_public.html" %}
{% load static %}
{% block title %}ALCRET - Contraseña Actualizada{% endblock %}
{% block content %}
<style>
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes checkPop { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .anim-brand { animation: fadeIn 0.6s ease-out both; }
  .anim-card { animation: fadeInUp 0.5s ease-out 0.15s both; }
  .anim-footer { animation: fadeIn 0.6s ease-out 0.4s both; }
  .anim-check { animation: checkPop 0.4s ease-out 0.3s both; }
</style>

<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-sm anim-brand">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-ink tracking-tight">ALCRET</h1>
        </div>

        <div class="anim-card bg-white rounded-2xl shadow-sm border-0 p-8 text-center">
            <div class="anim-check w-14 h-14 bg-success-bg text-success-text rounded-full flex items-center justify-center mx-auto mb-5">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="text-xl font-semibold text-ink mb-2">Contraseña actualizada</h2>
            <p class="text-sm text-ink-secondary mb-6">Tu contraseña fue restablecida exitosamente.</p>
            <a href="{% url 'login' %}" class="text-sm text-primary-600 hover:text-primary-700 font-medium transition-colors">Iniciar sesión &rarr;</a>
        </div>

        <p class="text-center text-xs text-ink-muted mt-8 anim-footer">ALCRET v1.0 — Sistema de Inventario</p>
    </div>
</div>
{% endblock %}
