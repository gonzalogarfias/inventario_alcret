{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ALCRET - Inventario{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo-icon.png' %}">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#0B3C95">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef3fa', 100: '#d4e1f2', 200: '#a9c3e6', 300: '#7ea5d9',
                            400: '#5387cd', 500: '#2869c0', 600: '#0B3C95', 700: '#09307a',
                            800: '#07245f', 900: '#051844',
                        },
                        surface: {
                            DEFAULT: '#FAFAFC',
                            card: '#FFFFFF',
                        },
                        ink: {
                            DEFAULT: '#1E2229',
                            secondary: '#687182',
                            muted: '#9CA3AF',
                        },
                        success: { bg: '#E6F4EA', text: '#137333', border: '#CEEAD6' },
                        error: { bg: '#FCE8E6', text: '#C5221F', border: '#F5C6C2' },
                        warning: { bg: '#FEF7E0', text: '#B06000', border: '#FDEAA8' },
                        info: { bg: '#E8F0FE', text: '#1A56DB', border: '#C3D9FC' },
                    }
                }
            }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
    {% block extra_head %}{% endblock %}
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }</script>
</head>
<body class="bg-surface font-sans antialiased text-ink">
    {% block content %}{% endblock %}
</body>
</html>
