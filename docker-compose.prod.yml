services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-inventario}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  web:
    image: ghcr.io/gonzalogarfias/inventario_alcret:latest
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.ec2
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  worker:
    image: ghcr.io/gonzalogarfias/inventario_alcret:latest
    command: celery -A config worker -l info --concurrency=2
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.ec2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/static:ro
    depends_on:
      - web
    restart: always

volumes:
  pgdata:
  redisdata:
  static_volume:
